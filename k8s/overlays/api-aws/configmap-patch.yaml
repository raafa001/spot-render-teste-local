apiVersion: v1
kind: ConfigMap
metadata:
  name: spot-render-backend-config
  namespace: spot-render
data:
  STORAGE_MODE: "s3"
  LOCAL_STORAGE_ROOT: "/storage"
  DATABASE_URL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/renderqueue"
  SQS_ENABLED: "true"
  SQS_ENDPOINT_URL: "https://sqs.us-east-1.amazonaws.com"
  SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/${AWS_ACCOUNT_ID}/spot-render-jobs"
  SQS_DLQ_URL: "https://sqs.us-east-1.amazonaws.com/${AWS_ACCOUNT_ID}/spot-render-jobs-dlq"
  AWS_ENDPOINT_URL: ""
  AWS_REGION: "us-east-1"
  WORKER_STORAGE_ROOT: "/storage"
  WORKER_QUEUE_PATH: "/storage/queue"
  WORKER_OUTPUT_ROOT: "/storage/output"
  WORKER_PROCESSED_ROOT: "/storage/completed"
  WORKER_FAILED_ROOT: "/storage/failed"
  OLLAMA_BASE_URL: "http://ollama.spot-ai.svc.cluster.local:11434"
