apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: spot-render-backend
  namespace: spot-render
spec:
  template:
    spec:
      initContainers:
        - name: init-storage
          image: alpine:3.19
          command: ["/bin/sh","-c"]
          args:
            - |
              ROOT="${LOCAL_STORAGE_ROOT:-/storage}"
              mkdir -p "$ROOT" "$ROOT/data"
              chmod -R 0777 "$ROOT"
          env:
            - name: LOCAL_STORAGE_ROOT
              value: /storage
          volumeMounts:
            - name: render-storage
              mountPath: /storage
      containers:
        - name: spot-render-backend
          env:
            - name: STORAGE_MODE
              value: local
            - name: LOCAL_STORAGE_ROOT
              value: /storage
            - name: DATABASE_URL
              value: sqlite:////storage/data/jobs.db
          volumeMounts:
            - name: render-storage
              mountPath: /storage
      volumes:
        - name: render-storage
          persistentVolumeClaim:
            claimName: spot-render-storage
