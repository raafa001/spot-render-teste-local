apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: spot-render-backend
  namespace: spot-render
spec:
  template:
    spec:
      containers:
        - name: spot-render-backend
          env:
            - name: STORAGE_MODE
              value: local
            - name: LOCAL_STORAGE_ROOT
              value: /storage
          volumeMounts:
            - name: render-storage
              mountPath: /storage
      volumes:
        - name: render-storage
          persistentVolumeClaim:
            claimName: spot-render-storage
