apiVersion: v1
kind: ConfigMap
metadata:
  name: spot-render-backend-config
  namespace: spot-render
data:
  STORAGE_MODE: "local"
  LOCAL_STORAGE_ROOT: "/storage"
  DATABASE_URL: "sqlite:////storage/data/jobs.db"
  SQS_ENABLED: "true"
  WORKER_MODE: "sqs"
  SQS_QUEUE_URL: "http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/spot-render-jobs"
  SQS_DLQ_URL: "http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/spot-render-jobs-dlq"
  AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
  AWS_REGION: "us-east-1"
  WORKER_STORAGE_ROOT: "/storage"
  WORKER_QUEUE_PATH: "/storage/queue"
  WORKER_OUTPUT_ROOT: "/storage/output"
  WORKER_PROCESSED_ROOT: "/storage/completed"
  WORKER_FAILED_ROOT: "/storage/failed"
