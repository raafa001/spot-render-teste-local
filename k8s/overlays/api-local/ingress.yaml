apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spot-render-backend
  namespace: spot-render
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.spot-render.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spot-render-backend-stable
                port:
                  number: 80
